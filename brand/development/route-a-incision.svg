<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Ruta A - Incisión</title>
  <desc id="desc">Dirección tipográfica de lujo para Fausto Vásquez.</desc>
  <rect width="1600" height="1000" fill="#090908"/>
  <text x="90" y="82" fill="#B58A52" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="8">RUTA A / INCISIÓN</text>
  <text x="90" y="130" fill="#8E887E" font-family="Arial, sans-serif" font-size="16" letter-spacing="2">Autoridad personal · precisión · lujo silencioso</text>

  <g transform="translate(90 220)">
    <text x="0" y="62" fill="#B58A52" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="15">FAUSTO</text>
    <text x="-8" y="230" fill="#F3EDE2" font-family="Georgia, serif" font-size="174" letter-spacing="-7">VÁSQUEZ</text>
    <path d="M28 76L93 247" stroke="#B58A52" stroke-width="11"/>
    <path d="M93 247L157 76" stroke="#090908" stroke-width="15"/>
    <text x="2" y="296" fill="#AAA297" font-family="Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="8">DERECHO PENAL ESTRATÉGICO</text>
  </g>

  <g transform="translate(1125 198)">
    <rect width="330" height="330" fill="#F0E8DA"/>
    <path d="M62 62L156 272L252 62" fill="none" stroke="#141210" stroke-width="35"/>
    <path d="M62 62L156 272" stroke="#B58A52" stroke-width="10"/>
    <text x="108" y="310" fill="#6D655B" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="5">V / INCISIÓN</text>
  </g>

  <line x1="90" y1="596" x2="1510" y2="596" stroke="#3B342C"/>

  <g transform="translate(90 650)">
    <text x="0" y="0" fill="#B58A52" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="5">PALETA</text>
    <rect x="0" y="38" width="110" height="110" fill="#090908" stroke="#494238"/>
    <rect x="128" y="38" width="110" height="110" fill="#F3EDE2"/>
    <rect x="256" y="38" width="110" height="110" fill="#B58A52"/>
    <rect x="384" y="38" width="110" height="110" fill="#4A2025"/>
    <text x="0" y="176" fill="#8E887E" font-family="Arial" font-size="12">Tinta</text>
    <text x="128" y="176" fill="#8E887E" font-family="Arial" font-size="12">Marfil</text>
    <text x="256" y="176" fill="#8E887E" font-family="Arial" font-size="12">Bronce</text>
    <text x="384" y="176" fill="#8E887E" font-family="Arial" font-size="12">Oxblood</text>
  </g>

  <g transform="translate(720 650)">
    <text x="0" y="0" fill="#B58A52" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="5">APLICACIÓN EDITORIAL</text>
    <rect x="0" y="38" width="260" height="210" fill="#F3EDE2"/>
    <text x="28" y="78" fill="#B58A52" font-family="Arial" font-size="10" font-weight="700" letter-spacing="4">INFORME JURÍDICO</text>
    <text x="26" y="132" fill="#141210" font-family="Georgia, serif" font-size="27">Teoría del caso</text>
    <text x="26" y="168" fill="#141210" font-family="Georgia, serif" font-size="27">y estrategia</text>
    <path d="M28 192H230" stroke="#B58A52"/>
    <text x="28" y="222" fill="#746C62" font-family="Arial" font-size="9" letter-spacing="2">FAUSTO VÁSQUEZ</text>
    <rect x="286" y="38" width="260" height="210" fill="#161413"/>
    <text x="312" y="84" fill="#B58A52" font-family="Arial" font-size="10" letter-spacing="3">PENSAMIENTO JURÍDICO</text>
    <text x="310" y="139" fill="#F3EDE2" font-family="Georgia, serif" font-size="26">La precisión cambia</text>
    <text x="310" y="174" fill="#F3EDE2" font-family="Georgia, serif" font-size="26">el curso de un caso.</text>
  </g>
</svg>
