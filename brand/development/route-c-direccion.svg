<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Ruta C - Dirección</title>
  <desc id="desc">Identidad autoral basada en trayectoria y dirección estratégica.</desc>
